<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовый калькулятор: Кооператив vs Банк</title>
    <style>
        :root {
            --bg-dark: #121824;
            --card-bg: #1e2640;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --accent-orange: #f59e0b;
            --input-bg: #151b30;
            --border-color: #2e3a5f;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .calc-wrapper {
            width: 100%;
            max-width: 1100px;
        }

        .calc-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .calc-header h2 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .calc-header p {
            color: var(--text-muted);
            margin: 0;
        }

        .calc-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
        }

        max-width: 900px {
            .calc-container { grid-template-columns: 1fr; }
        }

        .calc-block {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .inputs-side h3 {
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .input-box {
            margin-bottom: 20px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .input-field {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 16px;
            font-size: 1.1rem;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: var(--accent-blue);
        }

        .bank-rate-box .input-field:focus {
            border-color: var(--accent-orange);
        }

        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        max-width: 550px {
            .compare-grid { grid-template-columns: 1fr; }
        }

        .card {
            background: #151b30;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #252f52;
        }

        .coop-card { border-top: 4px solid var(--accent-green); }
        .bank-card { border-top: 4px solid var(--accent-orange); }

        .card h4 { margin: 0 0 5px 0; font-size: 1.2rem; }

        .badge, .badge-bank {
            display: inline-block;
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .badge { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .badge-bank { background: rgba(245, 158, 11, 0.15); color: var(--accent-orange); }

        .metric { margin-bottom: 12px; }
        .metric span { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2px; }
        .metric strong { font-size: 1.15rem; }

        .total-benefit-box {
            background: linear-gradient(135deg, #064e3b 0%, #111827 100%);
            border-radius: 12px;
            padding:


;
            text-align: center;
            border: 1px solid var(--accent-green);
        }

        .total-benefit-box h3 { margin: 0 0 10px 0; font-size: 1.1rem; color: var(--text-muted); }
        .benefit-amount { font-size: 2.2rem; font-weight: 800; color: var(--accent-green); margin-bottom: 8px; }
        .benefit-note { margin: 0; font-size: 0.85rem; color: var(--text-muted); }
        
        .rub-hint { color: var(--text-muted); font-size: 0.85rem; font-weight: normal; }
    </style>
</head>
<body>

    <div class="calc-wrapper">
        <header class="calc-header">
            <h2>Сравнение выгоды программы</h2>
            <p>Условия кооператива зафиксированы под 10% годовых</p>
        </header>

        <div class="calc-container">
            <!-- Левая колонка -->
            <div class="calc-block inputs-side">
                <h3>Параметры недвижимости</h3>
                
                <div class="input-box">
                    <div class="label-row">
                        <label for="price">Стоимость недвижимости (руб.)</label>
                    </div>
                    <input type="number" id="price" class="input-field" value="7000000">
                </div>

                <div class="input-box">
                    <div class="label-row">
                        <label for="down-payment">Первоначальный взнос (%)</label>
                        <span id="dp-rub-hint" class="rub-hint">0 ₽</span>
                    </div>
                    <input type="number" id="down-payment" class="input-field" value="20" min="0" max="100">
                </div>

                <div class="input-box">
                    <div class="label-row">
                        <label for="term">Срок программы (лет)</label>
                    </div>
                    <input type="number" id="term" class="input-field" value="10">
                </div>

                <div class="input-box bank-rate-box">
                    <div class="label-row">
                        <label for="bank-rate">Ставка в коммерческом банке (%)</label>
                    </div>
                    <input type="number" id="bank-rate" class="input-field" value="22" step="0.1">
                </div>
            </div>

            <!-- Правая колонка -->
            <div class="calc-block results-side">
                <div class="compare-grid">
                    <!-- Кооператив -->
                    <div class="card coop-card">
                        <h4>Кооператив</h4>
                        <div class="badge">Ставка 10% фиксирована</div>
                        <div class="card-metrics">
                            <div class="metric">
                                <span>Ежемесячный платеж:</span>
                                <strong id="coop-payment">0 ₽</strong>
                            </div>
                            <div class="metric">
                                <span>Общая переплата:</span>
                                <strong id="coop-overpayment">0 ₽</strong>
                            </div>
                        </div>
                    </div>

                    <!-- Банк -->
                    <div class="card bank-card">
                        <h4>Ипотека в банке</h4>
                        <div class="badge-bank">Обычный расчет</div>
                        <div class="card-metrics">
                            <div class="metric">
                                <span>Ежемесячный платеж:</span>
                                <strong id="bank-payment">0 ₽</strong>
                            </div>
                            <div class="metric">
                                <span>Общая переплата:</span>
                                <strong id="bank-overpayment">0 ₽</strong>
                            </div>
                        </div>
                    </div>
                </div>
                <script>
        var priceInput = document.getElementById("price");
        var dpInput = document.getElementById("down-payment");
        var termInput = document.getElementById("term");
        var bankRateInput = document.getElementById("bank-rate");
        var dpRubHint = document.getElementById("dp-rub-hint");

        var coopPaymentOut = document.getElementById("coop-payment");
        var coopOverpaymentOut = document.getElementById("coop-overpayment");
        var bankPaymentOut = document.getElementById("bank-payment");
        var bankOverpaymentOut = document.getElementById("bank-overpayment");
        var totalSavingOut = document.getElementById("total-saving");

        function calculateAnnuity(principal, annualRate, years) {
            if (principal <= 0 || years <= 0) return 0;
            var monthlyRate = annualRate / 12 / 100;
            var totalMonths = years * 12;
            if (monthlyRate === 0) return principal / totalMonths;
            return principal * (monthlyRate * Math.pow(1 + monthlyRate, totalMonths)) / (Math.pow(1 + monthlyRate, totalMonths) - 1);
        }
        function updateCalculator() {
            var price = parseFloat(priceInput.value) || 0;
            var dpPercent = parseFloat(dpInput.value) || 0;
            var termYears = parseFloat(termInput.value) || 0;
            var bankRate = parseFloat(bankRateInput.value) || 0;

            var downPaymentAmount = price * (dpPercent / 100);
            var loanAmount = price - downPaymentAmount;
