<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор: Кооператив vs Банк</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; box-sizing: border-box; }
        h2 { text-align: center; color: #333; margin-top: 0; margin-bottom: 20px; font-size: 20px; }
        label { display: block; margin: 12px 0 5px; font-weight: bold; font-size: 14px; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .bank-rate-input { background: #fff5f5; border: 1px solid #fc9d9d; }
        button { width: 100%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 6px; margin-top: 20px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #218838; }
        .columns { display: flex; gap: 15px; margin-top: 20px; border-top: 2px solid #f0f2f5; padding-top: 15px; }
        .col { flex: 1; padding: 15px; border-radius: 8px; box-sizing: border-box; text-align: center; }
        .coop { background: #e6f4ea; border: 2px solid #28a745; }
        .bank { background: #fce8e6; border: 2px solid #dc3545; }
        .col-title { font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        .coop .col-title { color: #137333; }
        .bank .col-title { color: #c5221f; }
        .res-val { font-size: 20px; font-weight: bold; margin: 8px 0; color: #333; }
        .small-text { font-size: 12px; color: #666; }
    </style>
</head>
<body>
<div class="box">
    <h2>Сравнение выгоды: Кооператив и Банк</h2>
    
    <label>Цена квартиры (₽)</label>
    <input type="number" id="c" value="5000000">
    
    <label>Первый взнос (₽)</label>
    <input type="number" id="d" value="1000000">
    
    <label>Срок (лет)</label>
    <input type="number" id="t" value="10">
    
    <label>Текущая ставка в банке (%) — <span style="color:#c5221f; font-weight:normal;">можно менять</span></label>
    <input type="number" id="bank_rate" class="bank-rate-input" value="20" step="0.1">
    
    <button onclick="calc()">Рассчитать выгоду</button>
    
    <div class="columns">
        <!-- Колонка Кооператива -->
        <div class="col coop">
            <div class="col-title">Наш Кооператив</div>
            <div class="small-text">Ставка зафиксирована: 10%</div>
            <div class="res-val" id="m_coop">0 ₽</div>
            <div class="small-text">в месяц</div>
        </div>
        
        <!-- Колонка Банка -->
        <div class="col bank">
            <div class="col-title">Обычный Банк</div>
            <div class="small-text" id="bank_text">При ставке: 20%</div>
            <div class="res-val" id="m_bank">0 ₽</div>
            <div class="small-text">в месяц</div>
        </div>
    </div>
</div>

<script>
function calc() {
    let c = +document.getElementById('c').value, d = +document.getElementById('d').value, t = +document.getElementById('t').value;
    let b_rate = +document.getElementById('bank_rate').value;
    let credit = c - d, months = t * 12;
    
    if(credit <= 0 || months <= 0) return alert('Проверьте цифры стоимости и взноса!');
    if(b_rate <= 0) return alert('Введите корректную ставку банка!');
    
    // Считаем Кооператив (всегда 10%)
    let r_coop = 10 / 100 / 12;
    let pay_coop = credit * (r_coop * Math.pow(1 + r_coop, months)) / (Math.pow(1 + r_coop, months) - 1);
    
    // Считаем Банк
    let r_bank = b_rate / 100 / 12;
    let pay_bank = credit * (r_bank * Math.pow(1 + r_bank, months)) / (Math.pow(1 + r_bank, months) - 1);
    
    let f = new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 });
    document.getElementById('m_coop').innerText = f.format(pay_coop);
    document


mentById('m_bank').innerText = f.format(pay_bank);
    document.getElementById('bank_text').innerText = 'При ставке: ' + b_rate + '%';
}
window.onload = calc;
</script>
</body>
</html>.getEle
